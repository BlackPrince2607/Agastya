        .glass-container {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.05);

        }

            background: linear-gradient(120deg, rgba(211, 190, 235, 0.05) 0%, rgba(104, 87, 126, 0.05) 100%);

                      "stack-sm": "8px",

                      "section-gap": "48px"

              "fontFamily": {
                      "headline-lg": ["Noto Serif"],
                      "headline-xl": ["Noto Serif"],

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface">
<!-- Top Navigation -->
<header class="fixed top-0 w-full z-50 bg-slate-950/20 backdrop-blur-xl border-b border-white/10 shadow-[0_0_20px_rgba(34,211,238,0.1)] flex justify-between items-center px-6 h-16 w-full">
<button class="text-cyan-400 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-xl font-bold uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 font-noto-serif"><span style="font-family: Inter;">Agastya</span></h1>
<div class="w-8 h-8 rounded-full overflow-hidden border border-cyan-400/30">
<img class="w-full h-full object-cover" data-alt="A high-fidelity digital rendering of a user profile avatar that reflects vibrant aura energy. The avatar is surrounded by a soft, ethereal glow of magenta and deep violet, set against a dark, cosmic background. The style is modern, sleek, and highly detailed, representing a digital soul or cosmic consciousness in a mystic futurism aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5XXharRJni40_6gjQnI0GRJ86pCcyYPFkpK_3lhNrGvA0c_mNgYpB-RqAtQtgjJxQlmX7VXK8BYUbk3sdC60q3IDYQi-VEKcpj9sHG-O2GOtn8JzP9vBfasnsZvgXuhTzwpbBcVMrpNEulrwNSEqeUb1FskwolWVWXgls1gKQPaFpHqeDkTQL5Asl9ohTpBDOqSgAo9GF9hGoq61_xco4XSNAndKcBuT_zodyU9lAA1iKS2zfVQ7qPcBpHu1otsopV-BNt6uCkCI">
</div>
</header>
<!-- Main Canvas -->
<main class="relative pt-24 pb-40 px-gutter min-h-screen flex flex-col">
<!-- Background Aura Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/4 -left-20 w-80 h-80 bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-secondary/10 rounded-full blur-[100px]"></div>
</div>
<!-- Chat Container -->
<div class="flex-grow flex flex-col space-y-stack-lg max-w-2xl mx-auto w-full">
<!-- AI Message -->
<div class="flex flex-col items-start space-y-stack-sm">
<div class="flex items-center space-y-stack-sm mb-2">
<div class="w-10 h-10 rounded-full glass-container flex items-center justify-center border-primary/40 shadow-[0_0_15px_rgba(211,190,235,0.3)]">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="auto_fix_high" style="font-variation-settings: &quot;FILL&quot; 1;">auto_fix_high</span>
</div>
<span class="font-label-caps text-label-caps text-on-primary-container ml-3 tracking-[0.2em] uppercase">Cosmos AI</span>
</div>
<div class="glass-container aura-shimmer p-stack-md rounded-tr-lg rounded-br-lg rounded-bl-lg max-w-[85%]">
<p class="font-body-lg text-body-lg text-on-surface leading-relaxed">
                        The stars speak clearly tonight. What do you wish to know about your journey?
                    </p>
</div>
</div>
<!-- Preloaded Prompts -->
<div class="flex flex-wrap gap-stack-sm mt-stack-lg">
<button class="glass-container px-stack-md py-stack-sm rounded-full font-label-caps text-label-caps text-secondary hover:border-secondary/60 hover:text-white transition-all duration-300">
                    Tell me about my future
                </button>
<button class="glass-container px-stack-md py-stack-sm rounded-full font-label-caps text-label-caps text-secondary hover:border-secondary/60 hover:text-white transition-all duration-300">
                    Will I succeed?
                </button>
<button class="glass-container px-stack-md py-stack-sm rounded-full font-label-caps text-label-caps text-secondary hover:border-secondary/60 hover:text-white transition-all duration-300">
                    Why do I overthink?
                </button>
</div>
<!-- Visualization Element (Mystic AI Presence) -->
<div class="flex justify-center py-section-gap">
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Rotating Aura Rings -->
<div class="absolute inset-0 border-2 border-dashed border-primary/20 rounded-full animate-[spin_20s_linear_infinite]"></div>
<div class="absolute inset-4 border border-secondary/20 rounded-full animate-[spin_15s_linear_infinite_reverse]"></div>
<!-- Core Cosmic Entity -->
<div class="w-24 h-24 rounded-full nebula-gradient flex items-center justify-center shadow-[0_0_50px_rgba(211,190,235,0.4)]">
<span class="material-symbols-outlined text-white text-5xl" data-icon="visibility" style="font-variation-settings: &quot;FILL&quot; 1;">visibility</span>
</div>
</div>
</div>
</div>
<!-- Input Area (Floating fixed) -->
<div class="fixed bottom-24 left-0 right-0 px-margin-page z-40 max-w-2xl mx-auto">
<div class="glass-container p-unit rounded-full flex items-center shadow-xl border-white/20">
<input class="bg-transparent border-none focus:ring-0 flex-grow px-stack-md py-stack-md font-body-md text-on-surface placeholder-outline-variant" placeholder="Ask anything..." type="text">
<button class="w-12 h-12 rounded-full nebula-gradient flex items-center justify-center text-white ml-2 active:scale-95 transition-transform shadow-lg">
<span class="material-symbols-outlined" data-icon="send">send</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[40px] border-t border-white/20 bg-slate-950/40 backdrop-blur-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] flex justify-around items-center h-20 px-4 pb-safe">
<button class="flex flex-col items-center justify-center text-slate-500 opacity-60 font-noto-serif text-[10px] uppercase tracking-tighter hover:text-purple-400 transition-colors active:scale-110 duration-300 ease-out">
<span class="material-symbols-outlined mb-1" data-icon="auto_awesome">auto_awesome</span>
<span class="">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 opacity-60 font-noto-serif text-[10px] uppercase tracking-tighter hover:text-purple-400 transition-colors active:scale-110 duration-300 ease-out">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
<span class="">Reports</span>
</button>
<button class="flex flex-col items-center justify-center text-cyan-300 drop-shadow-[0_0_8px_rgba(34,211,238,0.8)] font-noto-serif text-[10px] uppercase tracking-tighter active:scale-110 duration-300 ease-out">
<span class="material-symbols-outlined mb-1" data-icon="auto_fix_high" style="font-variation-settings: &quot;FILL&quot; 1;">auto_fix_high</span>
<span class="">Chat</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 opacity-60 font-noto-serif text-[10px] uppercase tracking-tighter hover:text-purple-400 transition-colors active:scale-110 duration-300 ease-out">
<span class="material-symbols-outlined mb-1" data-icon="favorite">favorite</span>
<span class="">Match</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 opacity-60 font-noto-serif text-[10px] uppercase tracking-tighter hover:text-purple-400 transition-colors active:scale-110 duration-300 ease-out">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="">Profile</span>
</button>
</nav>
