<style>
        body {
            background-color: #0f0e10;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(104, 87, 126, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.1) 0%, transparent 40%);
            min-height: 100vh;
            color: #e6e1e5;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(211, 190, 235, 0.3);
            box-shadow: 0 0 20px rgba(211, 190, 235, 0.1);
        }
        .selected-card {
            background: rgba(211, 190, 235, 0.1);
            border: 1px solid #d3beeb;
            box-shadow: 0 0 30px rgba(211, 190, 235, 0.2);
        }
        .nebula-gradient {
            background: linear-gradient(135deg, #d3beeb 0%, #68577e 100%);
        }
        .aurora-shimmer {
            position: relative;
            overflow: hidden;
        }
        .aurora-shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="antialiased">
<!-- Top Navigation (Shell Rule: Suppressed for Onboarding context, only Logo shown) -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center px-6 h-16 bg-slate-950/20 backdrop-blur-xl border-b border-white/10">
<span class="font-headline-md text-xl font-bold uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500"><span style="font-family: Inter;">Agastya</span></span>
</header>
<main class="pt-24 pb-12 px-margin-page max-w-lg mx-auto min-h-screen flex flex-col">
<!-- Progress Indicator Section -->
<div class="mb-stack-lg">
<div class="flex justify-between items-end mb-stack-sm">
<span class="font-label-caps text-label-caps text-on-secondary-container">Progress</span>
<span class="font-label-caps text-label-caps text-primary">Step 2 of 4</span>
</div>
<!-- Scanning Progress Bar Variant -->
<div class="h-1 w-full bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full w-2/4 nebula-gradient rounded-full">
<div class="absolute right-0 top-0 h-full w-4 bg-white blur-sm"></div>
</div>
</div>
</div>
<!-- Question Header -->
<section class="mb-section-gap">
<h1 class="font-headline-xl text-headline-xl text-on-background mb-stack-md leading-tight">
                What do you seek clarity on?
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80">
                The stars align to guide your specific path. Choose the area of your life that calls for wisdom today.
            </p>
</section>
<!-- Selection Cards Grid -->
<section class="grid grid-cols-1 gap-stack-md mb-section-gap">
<!-- Love Card -->
<button class="glass-card aurora-shimmer flex items-center p-stack-md rounded-lg text-left group">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center mr-stack-md">
<span class="material-symbols-outlined text-primary" data-icon="favorite" style="font-variation-settings: &quot;FILL&quot; 1;">favorite</span>
</div>
<div class="flex-grow">
<span class="font-headline-md text-headline-md block text-on-surface">Love</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm opacity-60">Relationships, soulmates &amp; heart connection</span>
</div>
<span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Career Card (Selected State for Demo) -->
<button class="glass-card selected-card aurora-shimmer flex items-center p-stack-md rounded-lg text-left group">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center mr-stack-md shadow-[0_0_15px_rgba(211,190,235,0.4)]">
<span class="material-symbols-outlined text-primary" data-icon="work" style="font-variation-settings: &quot;FILL&quot; 1;">work</span>
</div>
<div class="flex-grow">
<span class="font-headline-md text-headline-md block text-on-surface">Career</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm opacity-60">Vocation, purpose &amp; professional growth</span>
</div>
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: &quot;FILL&quot; 1;">check_circle</span>
</button>
<!-- Money Card -->
<button class="glass-card aurora-shimmer flex items-center p-stack-md rounded-lg text-left group">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center mr-stack-md">
<span class="material-symbols-outlined text-primary" data-icon="payments" style="font-variation-settings: &quot;FILL&quot; 1;">payments</span>
</div>
<div class="flex-grow">
<span class="font-headline-md text-headline-md block text-on-surface">Money</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm opacity-60">Abundance, stability &amp; financial flow</span>
</div>
<span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Self Growth Card -->
<button class="glass-card aurora-shimmer flex items-center p-stack-md rounded-lg text-left group">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center mr-stack-md">
<span class="material-symbols-outlined text-primary" data-icon="eco" style="font-variation-settings: &quot;FILL&quot; 1;">eco</span>
</div>
<div class="flex-grow">
<span class="font-headline-md text-headline-md block text-on-surface">Self Growth</span>
<span class="font-body-md text-body-md text-on-surface-variant text-sm opacity-60">Personal evolution &amp; spiritual journey</span>
</div>
<span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</button>
</section>

<img class="absolute inset-0 w-full h-full object-cover opacity-20 mix-blend-screen" data-alt="A macro photography shot of cosmic dust and nebula clouds in deep space, featuring intense highlights of violet and cyan energy. The lighting is dramatic and cinematic, creating a sense of vast mystery and ethereal beauty that complements a futuristic divine interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBf9tc76mLcRYzxwBoND4WtEutsuTvJldw6d2CE4986N9Nl_unzTbaQ2v1yQyMAgZTQ_GHRlqL7XkbCFaWnf98y5x6qmv9L8n5SLxNSe193sdjsJ4B_9Vp8CHJlg9vIHvuumIqPmDN42VbQNkLOL_gtd6AljcNfiqM_xeaeZKSXvAjDMPIuDQI4hacvuCaYu53EO0Ilt_6flHOOwoCOqZIenQ1HlNLMPg45Onn62C8GSYXK4z7a2Xj_C4YLqFnWNkIx9tBxtXBse-k">
<div class="relative z-10 text-center">
<div class="inline-flex items-center space-x-stack-sm px-4 py-2 rounded-full bg-surface-container-low border border-white/5 backdrop-blur-md">
<span class="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_8px_rgba(34,211,238,1)]"></span>
<span class="font-label-caps text-[10px] text-cyan-300 tracking-widest uppercase">AI Pattern Mapping Active</span>
</div>
</div>
</div>
<!-- Action Button -->
<div class="mt-stack-lg">
<button class="w-full py-5 rounded-full nebula-gradient font-label-caps text-label-caps text-on-primary shadow-[0_10px_30px_rgba(104,87,126,0.3)] active:scale-95 transition-transform">
                Continue Journey
            </button>
<button class="w-full py-4 mt-stack-sm rounded-full font-label-caps text-label-caps text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity">
                Skip for now
            </button>
</div>
</main>
<!-- Bottom Nav is suppressed for Onboarding screens according to Shell Visibility rules -->
