<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Agastya - Palm Scan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>

            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(18, 18, 28, 0.8);

            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .palm-glow {
            filter: drop-shadow(0 0 15px rgba(123, 97, 255, 0.6));
        }
        .camera-corner {
            width: 40px;
            height: 40px;
            border-color: #7B61FF;
            position: absolute;
        }
    </style>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#2a2931",

                        "inverse-surface": "#e4e1ec",
                        "inverse-primary": "#6d3bd7",

                        "on-surface-variant": "#cbc3d7",

                        "surface": "#13131a",

                        "primary-container": "#a078ff",

                        "on-secondary-fixed": "#3e0022",

                        "gutter": "16px",
                        "lg": "24px"

                    "fontFamily": {
                        "caption": ["Inter"],
                        "h1": ["Inter"],
                        "body": ["Inter"],

                        "h2": ["Inter"],

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar Shell -->
<header class="bg-[#0B0B12]/80 backdrop-blur-xl border-b border-white/10 shadow-[0_4px_20px_rgba(123,97,255,0.1)] fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-white/10">
<span class="material-symbols-outlined text-primary">person</span>
</div>
<span class="text-2xl font-bold bg-gradient-to-r from-[#7B61FF] to-[#EC4899] bg-clip-text text-transparent font-h1">Agastya</span>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-slate-400 hover:opacity-80 transition-opacity active:scale-95 duration-200" data-icon="auto_awesome"></button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 mt-20 mb-28 px-margin-page flex flex-col items-center">
<!-- Instructional Header -->
<div class="text-center mb-lg max-w-sm">
<h2 class="font-h2 text-h2 text-on-surface mb-sm">Palm Scan</h2>
<p class="font-caption text-caption text-on-surface-variant leading-relaxed">
                Align your palm with the guide and select your hand type to begin the celestial reading.
            </p>
</div>
<!-- Viewfinder Section -->
<div class="relative w-full aspect-[3/4] max-w-md glass-card rounded-[32px] overflow-hidden flex items-center justify-center p-md">
<!-- Simulated Camera Feed with Guide -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-60 grayscale brightness-50" data-alt="A moody, high-contrast close-up of a human hand placed against a dark, cosmic background. The lighting is dramatic and ethereal, with soft purple and blue ambient glows reflecting off the skin. The overall aesthetic is mysterious and high-tech, fitting a futuristic biometric or astrological scanning interface in a deep midnight color palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuALfARKEtUg_3VJMAJ38pQi7QPr1Y97pbDPEjpOVBrTLOrHPedbZ1TBK31nqwRxkvkuig3DjTsyLqqpNVtKSFluQjbnh4j7j1QJr32AZqat7k4ml3hp2lM7sO2pENkZp-UtQzbEiLWb1kD5qZRojOeZUtTxoiRoviP3j0euydeFkvKamInygaqbk6OFZwx3r_zzcDxg3h1wboRALy1IR8caPJbtvLeHBB74HtkhhKE5M7stgTYeOXoAAGzo-8DHsSUO4XvCCm_b8kg"/>
</div>
<!-- Viewfinder Corners -->
<div class="absolute top-8 left-8 camera-corner border-t-2 border-l-2 rounded-tl-xl opacity-80"></div>
<div class="absolute top-8 right-8 camera-corner border-t-2 border-r-2 rounded-tr-xl opacity-80"></div>
<div class="absolute bottom-8 left-8 camera-corner border-b-2 border-l-2 rounded-bl-xl opacity-80"></div>
<div class="absolute bottom-8 right-8 camera-corner border-b-2 border-r-2 rounded-br-xl opacity-80"></div>
<!-- Glowing Palm Silhouette -->
<div class="relative z-10 flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-[180px] text-[#7B61FF] palm-glow" style="font-variation-settings: 'wght' 100;">pan_tool</span>
</div>
<!-- Scanning Line (Decorative) -->
<div class="absolute inset-x-0 h-[2px] bg-gradient-to-r from-transparent via-[#EC4899] to-transparent top-1/2 -translate-y-1/2 blur-sm"></div>
</div>
<!-- Hand Selection Controls -->
<div class="w-full max-w-md grid grid-cols-2 gap-gutter mt-lg">
<button class="glass-card flex flex-col items-center justify-center py-md rounded-xl hover:bg-white/5 active:scale-95 transition-all group border-primary/20">
<span class="material-symbols-outlined text-secondary mb-sm group-hover:scale-110 transition-transform" data-icon="female"></span>
<span class="font-label-bold text-label-bold uppercase tracking-wider text-on-surface">Scan Left Hand</span>
<span class="text-[10px] text-on-surface-variant font-medium">(Women)</span>
</button>
<button class="glass-card flex flex-col items-center justify-center py-md rounded-xl hover:bg-white/5 active:scale-95 transition-all group border-primary/20">
<span class="material-symbols-outlined text-primary mb-sm group-hover:scale-110 transition-transform" data-icon="male"></span>
<span class="font-label-bold text-label-bold uppercase tracking-wider text-on-surface">Scan Right Hand</span>
<span class="text-[10px] text-on-surface-variant font-medium">(Men)</span>
</button>
</div>
<!-- Action Button -->
<div class="w-full max-w-md mt-xxl">
<button class="w-full py-md rounded-full bg-gradient-to-r from-[#7B61FF] to-[#EC4899] text-white font-label-bold text-h3 shadow-[0_8px_30px_rgba(123,97,255,0.4)] hover:opacity-90 active:scale-[0.96] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="sensors"></span>
                Start Scan
            </button>
<p class="text-center mt-md font-caption text-caption text-slate-500 italic">
                By scanning, you agree to our Celestial Privacy Terms.
            </p>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="bg-[#12121C]/90 backdrop-blur-2xl border-t border-white/10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 z-50 rounded-t-[24px]">
<div class="flex flex-col items-center justify-center text-slate-500 p-2 hover:text-violet-400 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="home"></span>
<span class="text-[10px] font-medium font-caption uppercase tracking-widest mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 p-2 hover:text-violet-400 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="description"></span>
<span class="text-[10px] font-medium font-caption uppercase tracking-widest mt-1">Reports</span>
</div>
<div class="flex flex-col items-center justify-center text-white bg-gradient-to-br from-[#7B61FF]/20 to-[#EC4899]/20 rounded-2xl p-2 ring-1 ring-[#7B61FF]/50 active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="auto_fix_high" style="font-variation-settings: 'FILL' 1;"></span>
<span class="text-[10px] font-medium font-caption uppercase tracking-widest mt-1">Match</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 p-2 hover:text-violet-400 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="forum"></span>
<span class="text-[10px] font-medium font-caption uppercase tracking-widest mt-1">Chat</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 p-2 hover:text-violet-400 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="person"></span>
<span class="text-[10px] font-medium font-caption uppercase tracking-widest mt-1">Profile</span>
</div>
</nav>
</body></html>
